name: CI - API

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/api/**'
      - 'packages/shared-types/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/shared-types/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test NestJS API
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: english_pro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared-types
        run: pnpm --filter @english-pro/shared-types build

      - name: Lint API
        run: pnpm --filter english-pro-api lint

      - name: Run unit tests
        run: pnpm --filter english-pro-api test

      - name: Run e2e tests
        run: pnpm --filter english-pro-api test:e2e
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/english_pro_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
