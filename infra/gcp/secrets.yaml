# GCP Secret Manager - Required Secrets Template
# ================================================
# This file documents ALL secrets that must be created in GCP Secret Manager
# before deploying to Cloud Run.
#
# IMPORTANT: This is a TEMPLATE ONLY — do NOT store actual secret values here.
#
# To create secrets:
#   gcloud secrets create SECRET_NAME --replication-policy="automatic"
#   echo -n "secret-value" | gcloud secrets versions add SECRET_NAME --data-file=-
#
# To grant Cloud Run access:
#   gcloud secrets add-iam-policy-binding SECRET_NAME \
#     --member="serviceAccount:SERVICE_ACCOUNT@PROJECT_ID.iam.gserviceaccount.com" \
#     --role="roles/secretmanager.secretAccessor"

secrets:
  # ── Database ──────────────────────────────────────────────
  - name: DATABASE_URL
    description: PostgreSQL connection string for Prisma ORM
    used_by: [api]
    example: "postgresql://user:password@host:5432/english_pro?schema=public"

  - name: REDIS_URL
    description: Redis connection URL for caching and BullMQ
    used_by: [api, ai-worker]
    example: "redis://host:6379"

  # ── Supabase ──────────────────────────────────────────────
  - name: SUPABASE_URL
    description: Supabase project URL
    used_by: [api]
    example: "https://your-project.supabase.co"

  - name: SUPABASE_ANON_KEY
    description: Supabase anonymous/public key
    used_by: [api]
    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

  # ── Authentication ────────────────────────────────────────
  - name: JWT_SECRET
    description: JWT signing secret for API authentication
    used_by: [api]
    example: "your-secure-jwt-secret-min-32-chars"

  # ── AI Providers ──────────────────────────────────────────
  - name: OPENAI_API_KEY
    description: OpenAI API key for GPT models
    used_by: [ai-worker]
    example: "sk-..."

  - name: GOOGLE_AI_API_KEY
    description: Google AI (Gemini) API key
    used_by: [ai-worker]
    example: "AIza..."

  # ── GCP ───────────────────────────────────────────────────
  - name: GCP_PROJECT_ID
    description: GCP Project ID
    used_by: [api, ai-worker]
    example: "english-pro-prod"

# ── GitHub Repository Secrets ─────────────────────────────────
# These secrets must be configured in GitHub Repository Settings → Secrets
github_secrets:
  - name: GCP_PROJECT_ID
    description: GCP Project ID for Docker image tagging and deployment
    example: "english-pro-prod"

  - name: WIF_PROVIDER
    description: Workload Identity Federation Provider resource name
    example: "projects/123456/locations/global/workloadIdentityPools/github/providers/github"

  - name: WIF_SERVICE_ACCOUNT
    description: GCP Service Account email for GitHub Actions
    example: "github-deploy@english-pro-prod.iam.gserviceaccount.com"
