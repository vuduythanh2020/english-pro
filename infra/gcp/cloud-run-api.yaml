# Cloud Run Service Definition - API
# This is a reference configuration for the english-pro-api service.
# Actual deployment is handled via GitHub Actions deploy-api.yml workflow.
# This file documents the expected Cloud Run configuration.

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: english-pro-api
  labels:
    app: english-pro
    component: api
  annotations:
    run.googleapis.com/launch-stage: GA
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: 1
        autoscaling.knative.dev/maxScale: 10
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: asia-southeast1-docker.pkg.dev/PROJECT_ID/english-pro/english-pro-api:latest
          ports:
            - containerPort: 3000
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: GCP_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: GCP_PROJECT_ID
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: REDIS_URL
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: SUPABASE_URL
            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: SUPABASE_ANON_KEY
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: JWT_SECRET
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            periodSeconds: 30
            failureThreshold: 3
